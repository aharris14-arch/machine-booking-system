<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Machine Booking</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <script>
    // AUTH CHECK
    if(!localStorage.getItem("token")){
      window.location = "login.html";
    }
  </script>
</head>

<body>

<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span>Machine Booking · Admin</span>
    </div>

    <div class="nav">
      <button class="ghost inline" onclick="loadAll()">Load Bookings</button>
      <button class="ghost inline" onclick="loadAnalytics()">Analytics</button>
      <button class="ghost inline" onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- HEADER -->
  <div class="page-head">
    <div>
      <h2>Admin Dashboard</h2>
      <p>Manage all machine bookings in real time</p>
    </div>
  </div>

  <!-- STATS -->
  <div class="tiles">
    <div class="tile">
      <div class="k">Total bookings</div>
      <div class="v" id="totalBookings">0</div>
    </div>

    <div class="tile">
      <div class="k">Active machines</div>
      <div class="v">4</div>
    </div>

    <div class="tile">
      <div class="k">Last update</div>
      <div class="v" id="lastUpdate">--:--</div>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid-2">

    <!-- BOOKINGS -->
    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">All Bookings</div>
        <button class="ghost inline" onclick="loadAll()">Refresh</button>
      </div>

      <div id="output">
        <p class="empty">Click "Load Bookings" to view data</p>
      </div>
    </section>

    <!-- ANALYTICS -->
    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">Analytics</div>
        <button class="ghost inline" onclick="loadAnalytics()">Refresh</button>
      </div>

      <canvas id="chart"></canvas>
    </section>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// =====================
// CONFIG
// =====================
const API = "https://machine-booking-system.onrender.com/api";

let chartInstance = null;


// =====================
// LOGOUT
// =====================
function logout(){
  localStorage.clear();
  window.location = "login.html";
}


// =====================
// CLOCK UPDATE
// =====================
function updateTime(){
  const now = new Date();
  document.getElementById("lastUpdate").innerText =
    now.getHours().toString().padStart(2,'0') + ":" +
    now.getMinutes().toString().padStart(2,'0');
}


// =====================
// LOAD BOOKINGS
// =====================
function loadAll(){

  fetch(API + "/bookings/all",{
    headers:{
      "Authorization": localStorage.getItem("token")
    }
  })
  .then(res => res.json())
  .then(data => {

    console.log("Bookings:", data);

    document.getElementById("totalBookings").innerText = data.length;

    const div = document.getElementById("output");

    if(!data.length){
      div.innerHTML = "<p class='empty'>No bookings found</p>";
      return;
    }

    div.innerHTML = data.map(b => `
      <div class="card">
        <b>${b.machine}</b><br>
        <small>${b.location}</small><br>
        ${b.date} | ${b.timeSlot}
      </div>
    `).join("");

    updateTime();

  })
  .catch(err=>{
    console.log(err);
    document.getElementById("output").innerHTML =
      "<p class='error'>Failed to load bookings</p>";
  });
}


// =====================
// ANALYTICS
// =====================
function loadAnalytics(){

  fetch(API + "/bookings/analytics",{
    headers:{
      "Authorization": localStorage.getItem("token")
    }
  })
  .then(res => res.json())
  .then(data => {

    const ctx = document.getElementById("chart");

    if(chartInstance){
      chartInstance.destroy();
    }

    chartInstance = new Chart(ctx,{
      type:"bar",
      data:{
        labels:Object.keys(data.machineUsage || {}),
        datasets:[{
          label:"Bookings",
          data:Object.values(data.machineUsage || {})
        }]
      }
    });

    updateTime();
  })
  .catch(err=>{
    console.log(err);
  });
}


// =====================
// AUTO LOAD ON OPEN
// =====================
loadAll();
loadAnalytics();

</script>

</body>
</html>
