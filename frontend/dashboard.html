<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard &middot; Machine Booking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if(!localStorage.getItem("token")){
  window.location = "login.html";
}
</script>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>Machine Booking</span>
    </div>
    <div class="nav">
      <span class="crumb" id="loc-crumb">Resident</span>
      <button class="ghost inline" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="page-head">
    <div>
      <div class="hello">Your dashboard</div>
      <h2>Book a slot, check your schedule.</h2>
    </div>
  </div>

  <div class="grid-2">
    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">New booking</div>
      </div>

      <div class="field-group">
        <label for="machine">Machine</label>
        <select id="machine">
          <option value="" disabled selected>Select machine</option>
          <option>Units 1</option>
          <option>Units 2</option>
          <option>Blocks 1</option>
          <option>Blocks 2</option>
        </select>
      </div>

      <div class="field-group">
        <label for="date">Date</label>
        <input type="date" id="date">
      </div>

      <div class="field-group">
          <label>Time Slot (60 min)</label>
          <select id="timeSlot">
            <option value="" disabled selected>Select Slot</option>
            <option value="05:00">5:00 AM - 6:00 AM</option>
            <option value="06:00">6:00 AM - 7:00 AM</option>
            <option value="07:00">7:00 AM - 8:00 AM</option>
            <option value="08:00">08:00 AM - 09:00 AM</option>
            <option value="09:00">09:00 AM - 10:00 AM</option>
            <option value="10:00">10:00 AM - 11:00 AM</option>
            <option value="11:00">11:00 AM - 12:00 PM</option>
            <option value="12:00">12:00 PM - 01:00 PM</option>
            <option value="13:00">01:00 PM - 02:00 PM</option>
            <option value="14:00">02:00 PM - 03:00 PM</option>
            <option value="15:00">03:00 PM - 04:00 PM</option>
            <option value="16:00">04:00 PM - 05:00 PM</option>
            <option value="17:00">05:00 PM - 06:00 PM</option>
            <option value="18:00">06:00 PM - 07:00 PM</option>
            <option value="19:00">07:00 PM - 08:00 PM</option>
            <option value="20:00">08:00 PM - 09:00 PM</option>
            <option value="21:00">09:00 PM - 10:00 PM</option>
            <option value="22:00">10:00 PM - 11:00 PM</option>
            <option value="23:00">11:00 PM - 12:00 AM</option>
          </select>
      </div>

      <div id="message" aria-live="polite"></div>

      <button class="primary" onclick="book()">Reserve slot</button>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">Your schedule</div>
        <button class="ghost inline" onclick="loadBookings()">Refresh</button>
      </div>

      <div id="bookings">
        <div class="empty">No bookings yet. Your reservations will appear here.</div>
      </div>
    </section>
  </div>
</div>

<script>
  try {
    var loc = localStorage.getItem("location");
    if (loc) document.getElementById("loc-crumb").textContent = loc;
  } catch(e) {}
</script>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="script.js"></script>

<script>
const socket = io("https://machine-booking-system.onrender.com");

socket.on("bookingUpdated", ()=>{
  loadBookings();
});
</script>

</body>
</html>
